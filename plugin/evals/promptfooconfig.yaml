description: Stellenium DC Skills evaluation suite
prompts:
- file://prompt.json
providers:
- id: anthropic:messages:claude-sonnet-4-20250514
  config:
    temperature: 0.0
    max_tokens: 8192
defaultTest:
  options:
    provider: anthropic:messages:claude-sonnet-4-20250514
tests:
- description: bd-colo-business-model eval 1
  vars:
    skill_content: file://../skills/bd-colo-business-model/SKILL.md
    prompt: 'Build a colocation business model for a 20MW retail/wholesale hybrid facility in Ashburn, Virginia (Tier 1 carrier-dense
      market). Target tenant mix: 40% enterprise, 30% hyperscale wholesale anchor, 30% network/carrier tenants. The facility
      offers Tier III availability with optional Tier IV for financial sector tenants. 15 network carriers are on-net with
      an internet exchange presence. Utility rate is $0.065/kWh with a PUE target of 1.25. Model a 5-year ramp to 92% stabilized
      occupancy. Include interconnection revenue modeling at Ashburn market rates and reference SLA-BENCHMARKS.md for tier-based
      pricing differentiation.'
  assert:
  - type: llm-rubric
    value: Pricing tiers reflect Ashburn Tier 1 market rates for wholesale and retail
  - type: llm-rubric
    value: Interconnection revenue modeled at 15-20% of total revenue
  - type: llm-rubric
    value: Occupancy ramp uses Tier 1 metro assumptions
  - type: llm-rubric
    value: SLA-BENCHMARKS.md is referenced for tier-based pricing
  - type: llm-rubric
    value: Revenue waterfall breaks out wholesale, retail, and interconnection components
  - type: llm-rubric
    value: Tenant mix percentages match the specified 40/30/30 split
- description: bd-colo-business-model eval 2
  vars:
    skill_content: file://../skills/bd-colo-business-model/SKILL.md
    prompt: Develop a colocation business model for a 10MW retail-only facility in Nashville, Tennessee (Tier 2 secondary
      market). Target tenants are enterprise only -- no hyperscale wholesale and limited carrier presence (5 carriers on-net).
      Offer Tier III availability. Utility rate is $0.08/kWh with a PUE of 1.35. Model conservative occupancy ramp for a secondary
      market with no anchor tenant pre-commitment. Include operating cost model showing staffing, power, maintenance, and
      property tax (Tennessee has no state income tax but has property tax on DC equipment).
  assert:
  - type: llm-rubric
    value: Occupancy ramp reflects secondary market pace, slower than Tier 1 assumptions
  - type: llm-rubric
    value: No hyperscale wholesale pricing is included in the model
  - type: llm-rubric
    value: Interconnection revenue is lower than primary market models at 5-10%
  - type: llm-rubric
    value: Operating costs reflect smaller-scale staffing and operations
  - type: llm-rubric
    value: Power cost modeled at the higher utility rate with PUE impact on margins
  - type: llm-rubric
    value: Key metrics include breakeven occupancy percentage
- description: bd-colo-business-model eval 3
  vars:
    skill_content: file://../skills/bd-colo-business-model/SKILL.md
    prompt: 'Create a colocation business model for a 50MW wholesale-focused campus in Dallas, Texas (Tier 1 market). Strategy:
      secure 2 hyperscale anchor tenants for 30MW total (pre-leased) with remaining 20MW for enterprise retail and carrier
      tenants. Wholesale anchor contracts are 7-year terms at competitive Dallas market rates. Dallas has favorable property
      tax treatment for data center equipment and $0.055/kWh utility rates. PUE target 1.20 with direct liquid cooling capability.
      Model rapid occupancy ramp driven by pre-leased anchor capacity and show tenant mix weighted heavily to hyperscale with
      lower blended margin but faster stabilization.'
  assert:
  - type: llm-rubric
    value: Wholesale pricing is dominant at $100-150/kW monthly range
  - type: llm-rubric
    value: Occupancy ramp is accelerated by pre-leased anchor capacity showing 60%+ Year 1
  - type: llm-rubric
    value: Tenant mix is heavily weighted to hyperscale with corresponding margin impact
  - type: llm-rubric
    value: Lower blended margin acknowledged due to wholesale dominance
  - type: llm-rubric
    value: Revenue waterfall shows wholesale as the majority revenue component
  - type: llm-rubric
    value: Dallas-specific favorable property tax and low power costs are reflected
- description: bd-economic-impact eval 1
  vars:
    skill_content: file://../skills/bd-economic-impact/SKILL.md
    prompt: 'Produce an economic impact analysis for a 200MW hyperscale data center campus in Loudoun County, Virginia. Project
      details: $2 billion total CapEx over 3 phases, $150M annual OpEx at full build-out, 2,500 peak construction jobs over
      30 months, 120 permanent operations jobs with $95K average salary. The developer is requesting a 20-year sales and use
      tax exemption on equipment (estimated at $80M in tax savings). Use Virginia-specific data from US-STATE-INCENTIVES.md.
      Northern Virginia has a mature DC supply chain -- use default or slightly above-default multipliers. Calculate direct,
      indirect, and induced impacts for both construction and operations phases. Show tax revenue WITH and WITHOUT incentives.'
  assert:
  - type: llm-rubric
    value: Direct, indirect, and induced impacts are calculated separately for construction and operations phases
  - type: llm-rubric
    value: Tax revenue analysis shows both WITH incentives and WITHOUT incentives scenarios
  - type: llm-rubric
    value: Jobs per incentive dollar metric is calculated as a politically effective measure
  - type: llm-rubric
    value: Multipliers used are appropriate for a mature DC ecosystem like Northern Virginia
  - type: llm-rubric
    value: US-STATE-INCENTIVES.md is referenced for Virginia-specific sales tax exemption details
  - type: llm-rubric
    value: Construction jobs are clearly labeled as temporary with duration specified
- description: bd-economic-impact eval 2
  vars:
    skill_content: file://../skills/bd-economic-impact/SKILL.md
    prompt: 'Produce an economic impact analysis for a 50MW sovereign data center in a rural county in Mississippi. Project
      details: $500M total CapEx, $35M annual OpEx, 800 peak construction jobs over 24 months, 45 permanent operations jobs
      with $65K average salary. The developer is requesting a 10-year property tax abatement (PILOT at 25% of full rate) and
      a state sales tax exemption on equipment. The location has limited data center supply chain -- local contractors will
      handle 30% of construction spend, with 70% imported from out-of-state. Adjust multipliers downward for the rural location
      with shallow supply chain. Calculate the incentive breakeven point where cumulative tax revenue exceeds incentive cost.'
  assert:
  - type: llm-rubric
    value: Multipliers are adjusted downward from defaults to reflect limited rural supply chain
  - type: llm-rubric
    value: Construction and operations phase impacts use separate reduced multiplier sets
  - type: llm-rubric
    value: Incentive breakeven point is calculated showing when cumulative tax revenue exceeds incentive cost
  - type: llm-rubric
    value: PILOT abatement and sales tax exemption are modeled in the WITH incentives scenario
  - type: llm-rubric
    value: Community benefits section addresses workforce development and local hiring commitments
  - type: llm-rubric
    value: 70% out-of-state construction spend is factored into reduced indirect and induced impacts
- description: bd-economic-impact eval 3
  vars:
    skill_content: file://../skills/bd-economic-impact/SKILL.md
    prompt: 'Produce an economic impact analysis for a 100MW campus data center in Lagos, Nigeria, seeking IFC and AfDB co-financing.
      Project details: $800M total CapEx, $60M annual OpEx, 1,500 peak construction jobs (70% local hire), 80 permanent operations
      jobs with average salary 3x local median. The project is applying for a 10-year tax holiday under the Nigerian Investment
      Promotion Commission. Nigeria has a shallow DC supply chain -- most equipment is imported. Use significantly reduced
      multipliers (30-50% below defaults). The report will accompany a DFI funding application. Calculate impacts in both
      USD and local currency (NGN). Emphasize development impact metrics that resonate with DFIs: local job creation, technology
      transfer, digital infrastructure access, and import substitution.'
  assert:
  - type: llm-rubric
    value: Multipliers are reduced 30-50% below defaults for emerging market with limited supply chain
  - type: llm-rubric
    value: Impacts are presented in both USD and local currency (NGN) with exchange rate noted
  - type: llm-rubric
    value: Development impact metrics (technology transfer, digital infrastructure) are prominently featured
  - type: llm-rubric
    value: Local hire commitment (70% construction) is quantified and highlighted for DFI audience
  - type: llm-rubric
    value: Tax holiday is modeled in WITH and WITHOUT scenarios with government revenue impact
  - type: llm-rubric
    value: Import substitution and infrastructure gap reduction metrics are included for DFI alignment
- description: bd-government-proposal eval 1
  vars:
    skill_content: file://../skills/bd-government-proposal/SKILL.md
    prompt: 'Generate a state-level government proposal for a 100MW hyperscale data center campus in Columbus, Ohio. The developer
      is requesting a 15-year sales tax exemption on equipment and a 10-year property tax abatement through a PILOT agreement.
      In return, the developer offers: 45 permanent operations jobs, 2,000 peak construction jobs, $1.2 billion capital investment
      over 3 phases, and a $5M community workforce training fund. Ohio''s JobsOhio program is the target incentive vehicle.
      The site is in an Opportunity Zone census tract. Two competing developers are also pitching Ohio sites.'
  assert:
  - type: llm-rubric
    value: Proposal uses state-level framing focused on jobs, tax revenue, and economic development
  - type: llm-rubric
    value: Strategic alignment references Ohio-specific programs or economic development goals
  - type: llm-rubric
    value: Economic impact section quantifies permanent jobs, construction jobs, capital investment, and tax revenue
  - type: llm-rubric
    value: Ask/offer matrix demonstrates government receives more value than it gives
  - type: llm-rubric
    value: Opportunity Zone eligibility is mentioned as additional federal benefit
  - type: llm-rubric
    value: Competitive positioning against other developers is addressed
- description: bd-government-proposal eval 2
  vars:
    skill_content: file://../skills/bd-government-proposal/SKILL.md
    prompt: Create a federal government proposal for a 50MW sovereign AI compute facility near a military installation in
      Virginia. The facility will support classified and unclassified AI workloads for the Department of Defense. The developer
      is requesting a long-term land lease from DoD, expedited security clearance processing for construction workers, and
      a 10-year anchor tenancy commitment. The facility will be SCIF-capable and FedRAMP High authorized. Frame around national
      security and compute sovereignty, referencing the CHIPS and Science Act and the National AI Initiative.
  assert:
  - type: llm-rubric
    value: Proposal uses federal framing focused on national security and compute sovereignty
  - type: llm-rubric
    value: CHIPS and Science Act is referenced in strategic alignment
  - type: llm-rubric
    value: National AI Initiative or equivalent federal strategy is cited
  - type: llm-rubric
    value: SCIF capability and security clearance requirements are addressed
  - type: llm-rubric
    value: Tone is formal and mission-focused, not commercially oriented
  - type: llm-rubric
    value: Ask/offer matrix leads with national security benefit, not private returns
- description: bd-government-proposal eval 3
  vars:
    skill_content: file://../skills/bd-government-proposal/SKILL.md
    prompt: 'Generate a foreign government proposal for a 30MW data center in Nairobi, Kenya to support the Kenyan government''s
      Digital Economy Blueprint and Africa''s Growing AI ecosystem. The developer is requesting: government land allocation
      near Konza Technopolis, expedited permitting, and a 15-year tax holiday under Kenya''s Special Economic Zone program.
      The developer offers: 120 permanent jobs, technology transfer program with local universities, $400M investment, and
      sovereign data hosting capability. The project is eligible for IFC and AfDB financing. Reference REGULATORY-MATRIX.md
      for Kenya''s data protection framework and DFI-FUNDING.md for development finance alignment.'
  assert:
  - type: llm-rubric
    value: Kenya's Digital Economy Blueprint is referenced by name in strategic alignment
  - type: llm-rubric
    value: Sovereign AI capability and data residency are framed as national priorities
  - type: llm-rubric
    value: DFI funding eligibility (IFC and AfDB) is highlighted with specific program references
  - type: llm-rubric
    value: Technology transfer and university partnerships are prominently featured
  - type: llm-rubric
    value: Proposal references REGULATORY-MATRIX.md for data protection framework
  - type: llm-rubric
    value: Tone adapts to foreign government context with sovereignty and capacity-building emphasis
- description: bd-national-compute eval 1
  vars:
    skill_content: file://../skills/bd-national-compute/SKILL.md
    prompt: Develop a national AI compute strategy for Malaysia (population 34M, GDP $430B, GDP per capita $12,600). Malaysia
      has an existing national AI strategy (MyDIGITAL/National AI Roadmap 2025), 5 hyperscaler cloud regions announced or
      operational (Azure, AWS, GCP, Oracle, Huawei), strong fiber backbone (national coverage 95%+), and 3 submarine cable
      landing stations. Malaysia has 8 public universities with active AI research programs producing ~3,000 STEM graduates
      annually. Current DC capacity estimated at 500MW (mostly hyperscaler-owned). The government wants to assess sovereign
      compute needs separate from commercial hyperscaler capacity. Model demand for research, enterprise, and government workloads.
      Recommend a distribution strategy (centralized vs distributed vs hybrid) and phased buildout plan.
  assert:
  - type: llm-rubric
    value: Malaysian national AI strategy (MyDIGITAL or AI Roadmap) is referenced by name
  - type: llm-rubric
    value: Demand modeling covers research, enterprise, and government workloads separately
  - type: llm-rubric
    value: Sovereign compute gap is assessed separately from commercial hyperscaler capacity
  - type: llm-rubric
    value: Distribution strategy recommends centralized, distributed, or hybrid model with rationale
  - type: llm-rubric
    value: Phased buildout plan includes timelines, capacity targets, and investment estimates
  - type: llm-rubric
    value: Existing strong fiber backbone and submarine cable connectivity are factored into the strategy
- description: bd-national-compute eval 2
  vars:
    skill_content: file://../skills/bd-national-compute/SKILL.md
    prompt: 'Develop a national AI compute strategy for Rwanda (population 14M, GDP $13B, GDP per capita $930). Rwanda has
      a national digital transformation strategy (Smart Rwanda 2024 and ICT Hub Strategy). Limited existing DC infrastructure
      (~5MW total domestic capacity). One submarine cable connection via terrestrial fiber to East African Submarine Cable
      System (EASSy) through Tanzania. 2 universities with emerging AI programs, ~500 STEM graduates annually. The government
      is seeking IFC and AfDB financing for sovereign AI infrastructure. The strategy should address: severe compute gap,
      limited local supply chain, workforce development needs, and regional connectivity requirements. Reference DFI-FUNDING.md
      for IFC and AfDB alignment.'
  assert:
  - type: llm-rubric
    value: Rwanda's digital transformation strategy is referenced by name
  - type: llm-rubric
    value: Demand modeling uses conservative assumptions appropriate for low-income economy
  - type: llm-rubric
    value: Severe compute gap between limited domestic capacity and growing demand is quantified
  - type: llm-rubric
    value: Centralized distribution strategy is recommended with rationale for country size and infrastructure
  - type: llm-rubric
    value: DFI funding strategy (IFC, AfDB) is detailed with concessional debt and grant components
  - type: llm-rubric
    value: Workforce development and technology transfer are prominent strategy components
- description: bd-national-compute eval 3
  vars:
    skill_content: file://../skills/bd-national-compute/SKILL.md
    prompt: 'Develop a national AI compute strategy for the Kingdom of Saudi Arabia (population 36M, GDP $1.1T, GDP per capita
      $30,000). Saudi Arabia has Vision 2030, the National Strategy for Data and AI (NSDAI), and SDAIA (Saudi Data and AI
      Authority). Existing DC capacity ~300MW across Riyadh, Jeddah, and NEOM with aggressive expansion plans. Strong sovereign
      wealth fund (PIF) with $930B AUM. 15+ universities with AI programs, national fiber backbone at 98% coverage, multiple
      submarine cable landing stations. The government wants to become a regional AI compute hub serving the Middle East and
      North Africa. Model demand for domestic use AND regional export. Recommend a multi-site distribution strategy and phased
      buildout to 500MW+ sovereign capacity. Address: regional hub positioning, excess capacity for export, workforce localization
      (Saudization), and extreme climate cooling challenges.'
  assert:
  - type: llm-rubric
    value: Vision 2030, NSDAI, and SDAIA are referenced in strategic alignment
  - type: llm-rubric
    value: Demand modeling includes both domestic and regional export compute demand
  - type: llm-rubric
    value: Multi-site distribution strategy covers multiple Saudi cities with rationale
  - type: llm-rubric
    value: Regional hub positioning for MENA markets is analyzed with latency and regulatory advantages
  - type: llm-rubric
    value: Extreme climate cooling challenges (>50C ambient) are addressed in the strategy
  - type: llm-rubric
    value: PIF-funded sovereign investment model is reflected rather than DFI concessional financing
- description: bd-partnership-proposal eval 1
  vars:
    skill_content: file://../skills/bd-partnership-proposal/SKILL.md
    prompt: 'Generate a partnership proposal for a technology JV with a major cloud hyperscaler for a 100MW data center campus
      in Dallas, Texas. The hyperscaler will serve as the anchor tenant committing to 60MW over 10 years at a pre-negotiated
      rate, with options for the remaining 40MW. The developer contributes the site (entitled, 50 acres), development expertise,
      and operations capability. The hyperscaler contributes a 10-year compute commitment, technology design requirements,
      and customer demand certainty. Proposed structure: 60/40 JV (developer majority) with the hyperscaler''s compute commitment
      valued as equity contribution. Include term sheet with governance, economics, technology refresh obligations, and exclusivity
      terms.'
  assert:
  - type: llm-rubric
    value: Technology partner framing with compute commitment as core value proposition
  - type: llm-rubric
    value: Contribution framework includes developer site/expertise and hyperscaler compute commitment
  - type: llm-rubric
    value: Technology refresh CapEx obligations are explicitly addressed in governance or economics
  - type: llm-rubric
    value: Term sheet includes structured commercial terms with equity split, governance, and exit provisions
  - type: llm-rubric
    value: Exclusivity terms are defined with geographic specificity
  - type: llm-rubric
    value: Document is a polished narrative proposal, not a raw data table or checklist
- description: bd-partnership-proposal eval 2
  vars:
    skill_content: file://../skills/bd-partnership-proposal/SKILL.md
    prompt: 'Create a partnership proposal for an infrastructure JV with a regional electric utility for a 50MW data center
      in upstate New York. The utility owns 100 acres adjacent to a 115kV substation with 80MW of available capacity. The
      utility will contribute the land and dedicated power feed (valued at $30M via independent appraisal) as equity. The
      developer contributes $120M in cash equity plus development and operational expertise. Proposed structure: JV with equity
      based on capital contribution proportions. The utility wants board representation, protective provisions on major decisions,
      and a right of first refusal on future phases. Address land valuation methodology and operating responsibility allocation.'
  assert:
  - type: llm-rubric
    value: Infrastructure partner framing with land and power as equity contribution
  - type: llm-rubric
    value: Land valuation methodology is discussed with approach to valuing utility infrastructure
  - type: llm-rubric
    value: Operating responsibilities are allocated between utility and developer roles
  - type: llm-rubric
    value: Governance framework provides utility board representation proportional to equity stake
  - type: llm-rubric
    value: Right of first refusal on future phases is included in term sheet
  - type: llm-rubric
    value: Contribution framework distinguishes cash equity from in-kind equity contributions
- description: bd-partnership-proposal eval 3
  vars:
    skill_content: file://../skills/bd-partnership-proposal/SKILL.md
    prompt: 'Generate a partnership proposal for a sovereign wealth fund co-investment in a 200MW data center campus in Johannesburg,
      South Africa. The SWF (from a Gulf state) is investing $400M for a 40% stake; the developer retains 60%. The project
      qualifies for IFC and AfDB co-lending. The SWF requires: 2 of 5 board seats, protective provisions on asset sales and
      additional debt above $500M, preferred return of 10% with standard infrastructure waterfall, and an exit path via IPO
      or secondary sale after year 5. The project must address South African POPIA compliance, BBBEE requirements, local hiring
      commitments, and load shedding resilience through on-site generation. Reference DFI-FUNDING.md for IFC/AfDB alignment.'
  assert:
  - type: llm-rubric
    value: Financial partner framing with sovereign wealth fund governance protections
  - type: llm-rubric
    value: Preferred return and distribution waterfall structure are detailed in economics section
  - type: llm-rubric
    value: Board composition gives SWF 2 of 5 seats with protective provisions on major decisions
  - type: llm-rubric
    value: DFI co-lending (IFC and AfDB) is highlighted as risk mitigation and funding diversification
  - type: llm-rubric
    value: South African regulatory requirements (POPIA, BBBEE) and load shedding resilience are addressed
  - type: llm-rubric
    value: Exit mechanisms include both IPO path and secondary sale with timeline
- description: bd-rfp-response eval 1
  vars:
    skill_content: file://../skills/bd-rfp-response/SKILL.md
    prompt: 'Prepare an RFP response for a government agency (US General Services Administration) RFP for a 10MW sovereign
      data center build-to-suit. The RFP contains 50 requirements covering physical security (SCIF-capable spaces), availability
      (Tier III minimum with 99.982% uptime), data residency (all data must remain within US borders), local content (30%
      local workforce during construction), and FedRAMP High authorization. Our company has 15 years of experience, 8 operational
      facilities, and SOC 2 Type II and ISO 27001 certifications. Key differentiators: fastest modular deployment in the industry
      (16-week lead time), 99.995% historical uptime across portfolio, and existing FedRAMP Moderate authorization (upgrading
      to High). We have a compliance gap on the SCIF requirement -- we plan to subcontract to a cleared facility contractor.'
  assert:
  - type: llm-rubric
    value: Compliance matrix covers all stated requirements with Compliant, Partial, or Exception status
  - type: llm-rubric
    value: Security requirements including SCIF capability are addressed with specific plans
  - type: llm-rubric
    value: Win themes are present in both the executive summary and technical approach sections
  - type: llm-rubric
    value: Tone is formal and appropriate for government procurement
  - type: llm-rubric
    value: SCIF gap is addressed as Partial with subcontracting alternative, not ignored
  - type: llm-rubric
    value: FedRAMP High upgrade path is explained in the technical approach
- description: bd-rfp-response eval 2
  vars:
    skill_content: file://../skills/bd-rfp-response/SKILL.md
    prompt: 'Create an RFP response for a Fortune 500 enterprise seeking 5MW of colocation space in an existing facility.
      The RFP contains 30 requirements covering SLA (99.99% availability with financial credits), connectivity (minimum 3
      diverse fiber providers), pricing (per-kW/month with 3-year term), and expansion options (right of first refusal on
      adjacent space up to 10MW). Our company operates the target facility with current availability of 99.997% over the past
      24 months. Differentiators: existing facility with immediate availability (no construction risk), carrier-dense with
      12 network providers on-net, and dedicated customer success manager. We are the incumbent provider for the customer''s
      secondary site. Compliance gap: the RFP requires 72-hour UPS runtime but our facility has 48-hour battery backup plus
      N+1 generators with 72-hour fuel supply.'
  assert:
  - type: llm-rubric
    value: Compliance matrix is present with status for all 30 requirements
  - type: llm-rubric
    value: SLA commitments reference specific availability percentages and credit structures
  - type: llm-rubric
    value: Partial and Exception items include alternative explanations, not blank entries
  - type: llm-rubric
    value: Case studies are relevant to enterprise colocation use cases
  - type: llm-rubric
    value: UPS runtime gap addressed with generator backup as functionally equivalent alternative
  - type: llm-rubric
    value: Pricing section uses per-kW/month format as specified in the RFP
- description: bd-rfp-response eval 3
  vars:
    skill_content: file://../skills/bd-rfp-response/SKILL.md
    prompt: 'Prepare an RFP response for a hyperscale cloud provider issuing an RFP for 50MW wholesale lease with expansion
      to 200MW across a campus. The RFP contains 80+ requirements covering power density (minimum 30kW per rack with liquid
      cooling readiness), cooling (PUE target under 1.25), sustainability (100% renewable energy matching within 3 years,
      Scope 1+2+3 reporting), and contractual terms (10-year initial term with 5-year renewal options). Our company is developing
      a greenfield campus with 100MW Phase 1 capacity. Differentiators: purpose-built for AI/HPC density (designed for 50kW+
      per rack), on-site 60MW solar PPA in place, and direct liquid cooling infrastructure from day one. Win themes: AI-ready
      infrastructure, sustainability leadership, and campus scale. No compliance gaps identified but the sustainability Scope
      3 reporting requirement needs clarification on boundary definition.'
  assert:
  - type: llm-rubric
    value: Compliance matrix maps the full 80+ requirement set
  - type: llm-rubric
    value: Sustainability requirements addressed with specific renewable energy plans and timeline
  - type: llm-rubric
    value: Technical approach covers high-density AI/HPC infrastructure with liquid cooling
  - type: llm-rubric
    value: Pricing structure uses wholesale per-MW format appropriate for hyperscale
  - type: llm-rubric
    value: Scope 3 reporting addressed with proposed boundary definition pending clarification
  - type: llm-rubric
    value: Win themes of AI-ready infrastructure and sustainability appear across multiple sections
- description: bd-tenant-spec eval 1
  vars:
    skill_content: file://../skills/bd-tenant-spec/SKILL.md
    prompt: Run the tenant requirements questionnaire for an AI training company requesting 500 racks at 50kW per rack in
      a Tier III facility. They want direct-to-chip liquid cooling, 400Gbps InfiniBand interconnect between racks, carrier-neutral
      connectivity with 100Gbps internet, SOC 2 Type II compliance, and a private cage. They plan to grow 75% in 12 months
      and 150% in 24 months. They want a 3-year contract with deployment within 6 months. They initially asked for air cooling
      but their density requirements are 50kW/rack.
  assert:
  - type: llm-rubric
    value: 'Conflict flagged: 50kW/rack density is incompatible with air cooling, liquid cooling required'
  - type: llm-rubric
    value: Initial power correctly calculated at approximately 25MW (500 racks x 50kW)
  - type: llm-rubric
    value: Growth projection identifies that 150% growth in 24 months requires significant expansion capacity
  - type: llm-rubric
    value: InfiniBand interconnect requirements noted as affecting physical layout and rack placement
  - type: llm-rubric
    value: Questionnaire mode is evident -- requirements gathered FROM the tenant
  - type: llm-rubric
    value: Resource estimate includes PUE-adjusted total power and floor space calculation
- description: bd-tenant-spec eval 2
  vars:
    skill_content: file://../skills/bd-tenant-spec/SKILL.md
    prompt: 'Conduct tenant requirements discovery for an enterprise tenant requesting 50 racks at mixed density: 30 racks
      at 8kW (enterprise apps and databases) and 20 racks at 15kW (virtualization and containers). They require SOC 2 Type
      II and HIPAA compliance for healthcare data, a private suite with escorted visitor policy, Tier III availability with
      99.99% power SLA, hybrid cloud connectivity (AWS Direct Connect and Azure ExpressRoute), and 10ms latency to New York
      City. Contract term preference is 5 years with 20% annual growth. Deployment needed within 4 months.'
  assert:
  - type: llm-rubric
    value: 'Mixed density is correctly captured: 30 racks at 8kW and 20 racks at 15kW'
  - type: llm-rubric
    value: Total IT load calculated as approximately 540kW
  - type: llm-rubric
    value: HIPAA compliance requirement validated against private suite security model
  - type: llm-rubric
    value: Gap between 99.99% SLA request and Tier III design availability is flagged
  - type: llm-rubric
    value: Hybrid cloud cross-connect requirements (AWS Direct Connect, Azure ExpressRoute) are documented
  - type: llm-rubric
    value: Compliance cost stacking for SOC 2 + HIPAA is noted
- description: bd-tenant-spec eval 3
  vars:
    skill_content: file://../skills/bd-tenant-spec/SKILL.md
    prompt: Discover requirements for a hyperscale cloud provider pre-leasing 20MW initial capacity with plans to scale to
      60MW within 24 months. They require carrier-neutral connectivity with minimum 3 diverse fiber paths, Tier III with custom
