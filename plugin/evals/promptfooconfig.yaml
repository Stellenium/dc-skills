- description: predev-mou-framework eval 1
  vars:
    skill_content: file://../skills/predev-mou-framework/SKILL.md
    prompt: 'Generate a government MOU for a sovereign data center project in a US state. The state economic development authority
      is offering a 15-year property tax PILOT, sales tax exemption on equipment, and infrastructure improvements (road and
