  vars:
    skill_content: file://../skills/predev-mou-framework/SKILL.md
    prompt: 'Create a utility MOU for a 100MW+ power commitment for a hyperscale data center campus with phased delivery.
      Phase 1 requires 30MW within 18 months, Phase 2 adds 40MW at month 30, Phase 3 adds 30MW+ at month 42. The utility will
