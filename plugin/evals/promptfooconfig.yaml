  - type: llm-rubric
    value: Infrastructure commitments specify government obligations (road, water improvements)
  - type: llm-rubric
    value: Confidentiality provisions are explicitly identified as binding
  - type: llm-rubric
    value: Condition precedent includes required legislative/commission approval
